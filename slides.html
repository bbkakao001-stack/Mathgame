<style>

  :root{

     linear-gradient(160deg,#15183a,#0c0f24 60%)}
  .floater{position:absolute;border-radius:50%;opacity:.16;filter:blur(1px);pointer-events:none}
  /* slide + multiple transitions */
  .slide{position:absolute;inset:0;display:flex;flex-direction:column;padding:26px 30px 74px;opacity:0;visibility:hidden;transition:transform .55s cubic-bezier(.2,.8,.2,1),opacity .45s ease,visibility .45s}
  .slide.active{opacity:1;visibility:visible;z-index:5}
  .slide.prev{opacity:0}
  /* transition variants (active/prev states) */
  .t-slide{transform:translateX(60px) scale(.96)}
  .t-slide.active{transform:translateX(0) scale(1)}
  .t-slide.prev{transform:translateX(-60px) scale(.96)}
  .t-fade{transform:scale(1.04);opacity:0}
  .t-fade.active{transform:scale(1);opacity:1}
  .t-fade.prev{transform:scale(.96);opacity:0}
  .t-up{transform:translateY(50px) scale(.97)}
  .t-up.active{transform:translateY(0) scale(1)}
  .t-up.prev{transform:translateY(-50px) scale(.97)}
  .t-zoom{transform:scale(.7);opacity:0}
  .t-zoom.active{transform:scale(1);opacity:1}
  .t-zoom.prev{transform:scale(1.2);opacity:0}
  .t-flip{transform:rotateY(35deg) translateX(40px);transform-origin:left center}
  .t-flip.active{transform:rotateY(0) translateX(0)}
  .t-flip.prev{transform:rotateY(-35deg) translateX(-40px);transform-origin:right center}
  .slide.no-anim{transition:none!important}
  .slide.active .card{animation:cardIn .55s cubic-bezier(.2,.8,.2,1) both}
  @keyframes cardIn{from{opacity:.4;transform:translateY(18px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}

  .card::after{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(115deg,transparent 0 38%,rgba(255,255,255,.22) 48%,transparent 58%);transform:translateX(-120%);opacity:.7}
  .slide.active .card::after{animation:sheen 2.2s .35s ease-out both}
  @keyframes sheen{to{transform:translateX(120%)}}
  .topbar{display:flex;align-items:center;gap:10px;padding:13px 22px;color:#fff;background:linear-gradient(95deg,var(--c1),var(--c2));flex:0 0 auto}

  .topic-3 .topbar{background:linear-gradient(95deg,#46d399,#37b6c9)}
  .topic-intro .topbar{background:linear-gradient(95deg,#7b6cf6,#c86cf6)}

  .topbar h2{font-size:18px;margin:0;flex:1;font-weight:600}

  .body ul{margin:.3em 0 .6em;padding-left:1.2em}
  .body li{margin:.2em 0;font-size:14.5px;line-height:1.45}
  .grid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;align-items:stretch}
  .grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;align-items:stretch}

  .thai b{color:#a86b00}
  .thai .tag{display:inline-block;background:#ffb86b;color:#5a3500;border-radius:7px;padding:1px 7px;font-size:11px;margin-right:6px}
  .v{background:linear-gradient(120deg,var(--hi),#ffe8a3);border-radius:6px;padding:0 4px;cursor:pointer;border-bottom:2px dotted #d9b800;font-weight:600;color:#3a2e00;transition:transform .15s}

  #nav{position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;gap:8px;padding:8px 12px;background:linear-gradient(0deg,rgba(0,0,0,.55),transparent);z-index:50}

  #progwrap{flex:1;height:10px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;cursor:pointer}
  #prog{height:100%;width:0;background:linear-gradient(90deg,var(--c1),var(--c3),var(--c5));transition:width .35s}
  #counter{color:#fff;font-size:13px;min-width:64px;text-align:center;font-weight:600}
  #menu{position:fixed;inset:0;z-index:100;background:rgba(8,10,28,.85);backdrop-filter:blur(8px);display:none;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;padding:24px;overflow-y:auto}
  #menu.open{display:flex}
  #menu h2{color:#fff;margin:0 0 10px;font-size:22px}
  .mitem{display:block;width:min(440px,90%);text-align:left;color:#fff;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);padding:10px 14px;border-radius:12px;cursor:pointer;font-family:'Mali';font-size:14px}
  .mitem:hover{background:rgba(255,255,255,.16)}
  .mitem small{opacity:.7;font-size:11px;margin-left:6px}
  .mhead{color:#ffd76b;font-weight:700;margin:8px 0 2px;font-size:14px;width:min(440px,90%)}
  .flip{perspective:1000px;width:100%;max-width:680px;height:340px;margin:8px auto;cursor:pointer}
  .flip .inner{position:relative;width:100%;height:100%;transition:transform .6s;transform-style:preserve-3d}
  .flip.on .inner{transform:rotateY(180deg)}
  .flip .face{position:absolute;inset:0;border-radius:18px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;text-align:center;backface-visibility:hidden;box-shadow:var(--shadow)}
  .flip .front{background:linear-gradient(135deg,#fff,#eef1ff)}
  .flip .back{background:linear-gradient(135deg,#46d399,#37b6c9);color:#fff;transform:rotateY(180deg)}
  .flip .front .q{font-size:19px;font-weight:600;color:var(--ink);line-height:1.4}
  .flip .front .hint{margin-top:14px;font-size:13px;color:var(--ink2)}
  .flip .back .a{font-size:17px;font-weight:600;line-height:1.5}
  .flip .front::after{content:'แตะเพื่อเปิดเฉลย 👆';position:absolute;bottom:12px;font-size:12px;color:var(--ink2)}
  .mcq{background:#f6f7ff;border:1px solid #e6e9ff;border-radius:12px;padding:16px 18px;margin:4px auto;width:min(760px,100%)}
  .mcq .stem{font-weight:600;margin-bottom:12px;font-size:18px;line-height:1.35}
  .opts button{display:block;width:100%;text-align:left;margin:8px 0;padding:12px 14px;border-radius:10px;border:2px solid #e0e4f5;background:#fff;cursor:pointer;font-family:'Mali';font-size:15px;transition:all .15s}
  .opts button:hover{border-color:var(--c1)}
  .opts button.correct{background:#dffbe8;border-color:var(--ok);color:#15692f;animation:pop .4s}
  .opts button.wrong{background:#ffe0e4;border-color:var(--no);color:#921823;animation:shake .4s}
  .explain{font-size:13px;color:var(--ink2);margin-top:6px;display:none}
  .explain.show{display:block}
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .scorebox{background:linear-gradient(135deg,#5b8def,#7b6cf6);color:#fff;border-radius:14px;padding:12px 16px;text-align:center;margin:0 auto 8px;width:min(760px,100%)}
  .reveal{opacity:0;transform:translateY(14px)}
  .slide.active .reveal{animation:revealIn .5s forwards}
  .slide.active .reveal:nth-child(1){animation-delay:.08s}
  .slide.active .reveal:nth-child(2){animation-delay:.18s}
  .slide.active .reveal:nth-child(3){animation-delay:.28s}
  .slide.active .reveal:nth-child(4){animation-delay:.38s}
  .slide.active .reveal:nth-child(5){animation-delay:.48s}
  .slide.active .reveal:nth-child(6){animation-delay:.58s}
  @keyframes revealIn{to{opacity:1;transform:translateY(0)}}
  .slide.active .body > *{animation:itemIn .48s cubic-bezier(.2,.8,.2,1) both}
  .slide.active .body > *:nth-child(1){animation-delay:.08s}
  .slide.active .body > *:nth-child(2){animation-delay:.16s}
  .slide.active .body > *:nth-child(3){animation-delay:.24s}
  .slide.active .body > *:nth-child(4){animation-delay:.32s}
  .slide.active .body > *:nth-child(5){animation-delay:.4s}
  @keyframes itemIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
  .hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;padding:26px 30px 92px;text-align:center}
  .hero h1{font-size:clamp(26px,6vw,44px);margin:6px 0;text-shadow:0 4px 20px rgba(0,0,0,.4)}
  .hero p{font-size:15px;opacity:.85;max-width:560px}
  .badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:5px 14px;border-radius:20px;font-size:13px}
  #tip{position:fixed;z-index:200;background:#2a2d4a;color:#fff;border-radius:12px;padding:10px 14px;max-width:280px;box-shadow:0 8px 24px rgba(0,0,0,.4);display:none;font-size:14px;line-height:1.4}
  #tip .en{font-weight:700;font-size:15px}
  #tip .th{margin-top:4px;color:#ffd76b}
  #tip .say{margin-top:6px;font-size:11px;color:#9aa0c8}
  svg{display:block;margin:6px auto;max-width:100%}
  .caption{font-size:12px;color:var(--ink2);text-align:center;margin-top:-2px}
  .scan{width:100%;max-width:420px;border-radius:10px;border:1px solid #e6e9ff;box-shadow:var(--shadow);display:block;margin:4px auto}
  .netimg{background:#fff;object-fit:cover}
  .slide.active .netimg{animation:kenburns 8s ease-in-out infinite alternate}
  @keyframes kenburns{from{transform:scale(1)}to{transform:scale(1.045)}}
  .scanrow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;align-items:center}
  .scanrow .scan{max-width:200px}
  .scanstrip{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;width:min(640px,94vw);margin:12px auto 0}
  .scanstrip .scan{height:120px;object-fit:cover;margin:0;border-color:rgba(255,255,255,.45);box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .scanfail{background:#fff8e6;border:2px dashed #f4d77a;border-radius:12px;color:#6b551a;padding:10px;font-size:12px;line-height:1.45}
  .motion{position:relative;overflow:hidden;border-radius:14px;background:linear-gradient(135deg,#101735,#243a74);min-height:210px;box-shadow:var(--shadow);isolation:isolate}
  .motion.light{background:linear-gradient(135deg,#eaf6ff,#fff8e6)}
  .motion .label{position:absolute;left:14px;top:12px;background:rgba(255,255,255,.9);border-radius:999px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--ink);z-index:2}
  .bubble{position:absolute;bottom:-18px;border-radius:50%;background:rgba(255,255,255,.78);border:2px solid rgba(91,141,239,.6);animation:bubbleUp var(--dur,2.4s) linear infinite;left:var(--x);width:var(--s);height:var(--s)}
  @keyframes bubbleUp{to{transform:translateY(-240px) scale(.45);opacity:0}}
  .flameCore{position:absolute;left:50%;bottom:20px;width:110px;height:150px;transform:translateX(-50%);background:radial-gradient(circle at 50% 70%,#fff36b 0 18%,#ffb86b 35%,#ef5b6b 62%,transparent 64%);clip-path:polygon(50% 0,66% 28%,90% 52%,78% 100%,22% 100%,10% 52%,34% 28%);animation:flicker .42s ease-in-out infinite alternate}
  @keyframes flicker{to{transform:translateX(-50%) scaleX(.9) scaleY(1.08) rotate(-2deg);filter:hue-rotate(12deg)}}
  .phbar{position:absolute;left:24px;right:24px;bottom:40px;height:54px;border-radius:10px;background:linear-gradient(90deg,#ef4444,#fb923c,#facc15,#22c55e,#06b6d4,#3b82f6,#a855f7);box-shadow:inset 0 0 0 3px rgba(255,255,255,.75);animation:phPulse 2s ease-in-out infinite}
  @keyframes phPulse{50%{filter:saturate(1.5);transform:scaleY(1.08)}}
  .drop{position:absolute;top:34px;left:var(--x);width:18px;height:18px;border-radius:50% 50% 50% 0;background:var(--c);transform:rotate(-45deg);animation:dropFall var(--dur,1.8s) ease-in infinite}
  @keyframes dropFall{80%,100%{top:135px;opacity:.15;transform:rotate(-45deg) scale(.55)}}
  .particleStage{position:absolute;inset:34px 20px 18px;border:2px solid rgba(255,255,255,.35);border-radius:14px}
  .dot{position:absolute;width:16px;height:16px;border-radius:50%;background:var(--c5);left:var(--x);top:var(--y);animation:dash var(--dur,2.8s) ease-in-out infinite alternate}
  @keyframes dash{to{transform:translate(var(--dx),var(--dy)) scale(.9)}}
  .atom{position:absolute;left:50%;top:55%;width:96px;height:96px;margin:-48px;border-radius:50%;border:2px solid rgba(255,255,255,.7);animation:spin 3s linear infinite}
  .atom::before,.atom::after{content:'';position:absolute;inset:12px;border-radius:50%;border:2px solid rgba(255,255,255,.45)}
  .atom::before{transform:rotate(60deg)}.atom::after{transform:rotate(-60deg)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .videoBox{position:relative;min-height:210px;border-radius:14px;overflow:hidden;background:#111;box-shadow:var(--shadow)}
  .videoBox iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:150}
  .body::-webkit-scrollbar{width:8px}
  .body::-webkit-scrollbar-thumb{background:#c7ccf0;border-radius:8px}

  .pager button.cur{background:var(--c1);color:#fff}

    .slide{padding:14px 12px 70px}

    .scanstrip{grid-template-columns:1fr;max-width:280px}
    .scanstrip .scan{height:96px}
  }
  /* Presentation-ready visual system */
  :root{--bg:#07101f;--ink:#162033;--ink2:#58657a;--card:rgba(255,255,255,.97);--shadow:0 28px 90px rgba(0,0,0,.34)}
  html,body{font-family:"Mali",sans-serif!important}
  #stage{background:radial-gradient(circle at 12% 16%,rgba(56,189,248,.22),transparent 28%),radial-gradient(circle at 88% 78%,rgba(168,85,247,.2),transparent 30%),linear-gradient(145deg,#07101f,#111b3c 55%,#15113a)}
  .slide{padding:clamp(68px,8vh,86px) clamp(14px,4vw,54px) 92px}

  .slide.prev{z-index:1;pointer-events:none}

  .card>*{position:relative;z-index:2}
  .card::after{z-index:1}

<script>

/* say EN then TH */
function say(en,th){
  const s=window.speechSynthesis;s.cancel();
  const u1=new SpeechSynthesisUtterance(en);u1.lang='en-US';u1.rate=.85;
  s.speak(u1);
  if(th){u1.onend=()=>{const u2=new SpeechSynthesisUtterance(th);u2.lang='th-TH';u2.rate=.95;s.speak(u2);};}
}
const tip=document.getElementById('tip');
function showTip(e,en){
  const th=DICT[en.toLowerCase()]||'(ไม่พบคำแปล)';
  tip.innerHTML=`<div class="en">${en}</div><div class="th">${th}</div><div class="say">🔊 กำลังอ่าน...</div>`;
  tip.style.display='block';
  const r=e.currentTarget.getBoundingClientRect();
  let x=r.left, y=r.bottom+6;
  const tw=tip.offsetWidth;
  if(x+tw>window.innerWidth-10) x=window.innerWidth-tw-10;
  if(y+tip.offsetHeight>window.innerHeight-70) y=r.top-tip.offsetHeight-6;
  tip.style.left=x+'px';tip.style.top=y+'px';
  say(en,th);   /* auto-speak on click */
}
function hideTip(){tip.style.display='none';window.speechSynthesis.cancel();}
document.addEventListener('click',e=>{if(!e.target.closest('.v')&&!e.target.closest('#tip'))hideTip();});
function hydrateVocab(el){
  el.querySelectorAll('.v').forEach(v=>{
    /* Always restore the English word above its highlight background. */
    v.textContent=v.dataset.w;
    if(v.dataset.ready)return;
    v.dataset.ready='1';
    v.addEventListener('click',e=>{e.stopPropagation();showTip(e,v.dataset.w);});
  });
}
function repairScanImages(el){
  el.querySelectorAll('img.scan').forEach(img=>{
    if(img.dataset.scanReady)return;
    img.dataset.scanReady='1';
    const m=(img.getAttribute('src')||'').match(/page_(\d+)\.png/i);
    const page=img.dataset.page||m?.[1];
    if(!page){
      img.onerror=()=>{
        const box=document.createElement('div');
        box.className='scanfail';
        box.textContent='โหลดรูปจากเน็ตไม่ได้ — ตรวจสอบการเชื่อมต่ออินเทอร์เน็ต หรือ URL รูปภาพ';
        img.replaceWith(box);
      };
      return;
    }
    const file='page_'+String(page).padStart(3,'0')+'.png';
    const tries=['pages/'+file,'./pages/'+file];
    let attempt=Math.max(0,tries.indexOf(img.getAttribute('src')));
    img.onerror=()=>{
      attempt++;
      if(attempt<tries.length){
        img.src=tries[attempt];
        return;
      }
      const box=document.createElement('div');
      box.className='scanfail';
      box.textContent='ไม่พบรูป '+file+' — เปิดไฟล์ slides.html จากโฟลเดอร์ที่มีโฟลเดอร์ pages อยู่ข้างกัน';
      img.replaceWith(box);
    };
  });
}
function compactThaiSummaries(el){
  el.querySelectorAll('.thai').forEach(box=>{
    if(box.dataset.compact)return;
    box.dataset.compact='1';
    const tag=box.querySelector('.tag');
    const label=tag?tag.outerHTML:'<span class="tag">สรุป</span>';
    let text=box.textContent.replace(tag?.textContent||'','').replace(/\s+/g,' ').trim();
    text=text
      .replace(/^คุณได้เรียนจบบทที่ 4 แล้ว\s*[—-]\s*/,'')
      .replace(/^เลือกคำตอบแล้วเห็นถูก\/ผิดพร้อมคำอธิบาย\s*[—-]\s*/,'')
      .replace(/^แตะคำศัพท์สีเหลืองเพื่อดูคำแปลและฟังเสียงทันที\s*[—-]\s*/,'');
    if(text.length>105) text=text.slice(0,105).replace(/\s+\S*$/,'')+'...';
    box.innerHTML=label+text;
  });
}
function removeInlineThai(el){
  if(el.dataset.enMainReady)return;
  el.dataset.enMainReady='1';
  const roots=el.querySelectorAll('.body, .topbar h2');
  roots.forEach(root=>{
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{
      acceptNode(node){
        const parent=node.parentElement;
        if(!parent || parent.closest('.thai,.fact-th,.real-th,#tip'))return NodeFilter.FILTER_REJECT;
        return /[ก-๙]/.test(node.nodeValue)?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_SKIP;
      }
    });
    const nodes=[];
    while(walker.nextNode())nodes.push(walker.currentNode);
    nodes.forEach(node=>{
      node.nodeValue=node.nodeValue
        .replace(/\([^)]*[ก-๙][^)]*\)/g,'')
        .replace(/[·:：]\s*[ก-๙][^<\n]*/g,'')
        .replace(/[ก-๙]+/g,'')
        .replace(/\s+([,.;:!?])/g,'$1')
        .replace(/\s{2,}/g,' ');
    });
    root.querySelectorAll('small').forEach(s=>{if(!s.textContent.trim())s.remove();});
  });
}

function svgThermometer(tempPct){
  const y=160-tempPct*130;
  return `<svg viewBox="0 0 80 200" width="80" height="200">
    <rect x="32" y="20" width="16" height="140" rx="8" fill="#e6e9ff" stroke="#2a2d4a" stroke-width="2"/>

    <rect x="34" y="${y}" width="12" height="${168-y}" fill="#ef5b6b">
      <animate attributeName="height" from="0" to="${168-y}" dur="1.5s" fill="freeze"/>
      <animate attributeName="y" from="168" to="${y}" dur="1.5s" fill="freeze"/></rect>
    <text x="56" y="${y+4}" font-size="10" fill="#2a2d4a">${Math.round(tempPct*100)}°</text>

function svgParticles(state){
  let rows='';
  if(state==='solid'){
    const pts=[];for(let r=0;r<3;r++)for(let c=0;c<5;c++)pts.push([30+c*24,40+r*24]);
    rows=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="8" fill="#5b8def"><animateTransform attributeName="transform" type="translate" values="0,0;1,-1;-1,1;0,0" dur="${0.4+i*0.02}s" repeatCount="indefinite"/></circle>`).join('');
  }else if(state==='liquid'){
    const pts=[];for(let i=0;i<14;i++)pts.push([20+Math.random()*120,40+Math.random()*70]);
    rows=pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="7" fill="#46d399"><animateTransform attributeName="transform" type="translate" values="0,0;${(i%2?1:-1)*8},0;0,0" dur="${1+i*0.05}s" repeatCount="indefinite"/></circle>`).join('');
    rows+=`<path d="M10 120 Q80 110 150 120 L150 140 L10 140 Z" fill="#bfeee0" opacity=".5"/>`;
  }else{
    let s='';for(let i=0;i<8;i++){const x=20+Math.random()*120,y=20+Math.random()*100,dx=(Math.random()*40-20),dy=(Math.random()*40-20);s+=`<circle r="7" fill="#ffb86b"><animateMotion dur="${2+Math.random()*2}s" repeatCount="indefinite" path="M${x},${y} l${dx},${dy} l${-dx},${-dy}"/></circle>`;}
    rows=s+`<rect x="8" y="10" width="144" height="130" fill="none" stroke="#2a2d4a" stroke-width="2" rx="8"/>`;
  }
  return `<svg viewBox="0 0 160 160" width="160" height="160">${rows}</svg>`;
}

  const colors=['#ef5b6b','#f5785b','#ff9a3c','#ffc83c','#f0e63c','#cfe06b','#7bd88f','#37c9b0','#37b6c9','#37a0e0','#5b8def','#8a6cf6','#b66cf6','#d96cf6','#f06bd8'];
  const bars=colors.map((c,i)=>`<rect x="${10+i*18}" y="40" width="16" height="50" fill="${c}"><animate attributeName="height" from="0" to="50" dur=".3s" begin="${i*0.05}s" fill="freeze"/><animate attributeName="y" from="90" to="40" dur=".3s" begin="${i*0.05}s" fill="freeze"/></rect><text x="${18+i*18}" y="106" text-anchor="middle" font-size="9" fill="#5a5f7d">${i}</text>`).join('');

/* litmus that animates color change: startColor -> endColor */

function netImg(key,alt,style=''){
  return `<img class="scan netimg" src="${IMG[key]}" alt="${alt}" referrerpolicy="no-referrer" loading="lazy" style="${style}">`;

function motion(kind,label=''){
  if(kind==='boil'){
    return `<div class="motion light"><span class="label">${label||'Boiling motion'}</span><div style="position:absolute;left:22%;right:22%;bottom:22px;height:120px;border:5px solid #5b8def;border-top:0;border-radius:0 0 18px 18px;background:linear-gradient(#d9f3ff,#7dd3fc)"></div>${Array.from({length:16}).map((_,i)=>`<i class="bubble" style="--x:${18+Math.random()*64}%;--s:${10+Math.random()*18}px;--dur:${1.4+Math.random()*1.8}s;animation-delay:-${Math.random()*2}s"></i>`).join('')}<div style="position:absolute;left:38%;bottom:2px;width:24%;height:18px;background:#ff9a3c;border-radius:50%;filter:blur(2px);animation:phPulse 1s infinite"></div></div>`;
  }
  if(kind==='ph'){
    return `<div class="motion light"><span class="label">${label||'Indicator changes colour'}</span><div class="phbar"></div>${['#ef4444','#22c55e','#3b82f6'].map((c,i)=>`<i class="drop" style="--x:${26+i*22}%;--c:${c};--dur:${1.4+i*.25}s;animation-delay:-${i*.4}s"></i>`).join('')}<div style="position:absolute;left:24px;right:24px;bottom:20px;display:flex;justify-content:space-between;font-size:12px;color:#334155;font-weight:700"><span>acid</span><span>neutral</span><span>alkali</span></div></div>`;
  }
  if(kind==='particles'){
    const dots=Array.from({length:18}).map((_,i)=>`<i class="dot" style="--x:${8+Math.random()*82}%;--y:${10+Math.random()*75}%;--dx:${-38+Math.random()*76}px;--dy:${-30+Math.random()*60}px;--dur:${1.2+Math.random()*2.2}s;background:${['#5b8def','#46d399','#ffb86b'][i%3]}"></i>`).join('');
    return `<div class="motion"><span class="label">${label||'Particles never stop moving'}</span><div class="particleStage">${dots}</div></div>`;
  }
  if(kind==='flame'){
    return `<div class="motion"><span class="label">${label||'Flammable'}</span><div class="flameCore"></div>${Array.from({length:8}).map((_,i)=>`<i class="bubble" style="--x:${18+i*8}%;--s:${6+i}px;--dur:${1+i*.12}s;background:rgba(255,184,107,.7);border-color:rgba(239,91,107,.5)"></i>`).join('')}</div>`;
  }
  return `<div class="motion"><span class="label">${label}</span><div class="atom"></div></div>`;
}
function videoCard(url,title){
  return `<div class="videoBox"><iframe loading="lazy" allowfullscreen referrerpolicy="no-referrer" title="${title}" src="${url}"></iframe></div>`;
}
function videoSearch(query,title){
  return videoCard('https://www.youtube.com/embed?listType=search&list='+encodeURIComponent(query),title);
}

      <div class="mini"><h3>${V('boiling point')}</h3><p>The temperature at which a material boils — turns from a ${V('liquid')} into a ${V('gas')}.</p></div>
    </div>
    <h3>🧪 Method to measure</h3>
    <ol>
      <li>Place the material into a suitable container. Use a ${V('thermometer')} to measure its temperature.</li>
      <li>Heat the material steadily.</li>
      <li>Read the temperature every minute until it stops changing — that is the melting/boiling point.</li>
    </ol>
    <div class="grid2"><div style="display:flex;gap:14px;align-items:center;justify-content:center">${svgThermometer(.6)}${svgThermometer(1)}</div>${motion('boil','Heating: particles gain energy')}</div>
  </div>
  <div class="thai"><span class="tag">วิธี</span>เทสารใส่ภาชนะ → วัดอุณหภูมิเริ่มต้น → ให้ความร้อน → บันทึกทุกนาทีจนอุณหภูมิหยุดเปลี่ยน ค่านั้นคือจุดหลอมเหลว/จุดเดือด</div></div>`,{section:'t41'});

add('topic-2 '+pickT(4),`<div class="card reveal"><div class="topbar"><span class="chip">Activity 4.1</span><h2>Plot & read the graph</h2></div>
  <div class="body">
    <p>📝 <b>A1 Plot tips:</b> changed ${V('variable')} (time) on horizontal ${V('axis')}; measured variable on vertical axis; plot crosses, circle any ${V('anomalous results')}, join the crosses.</p>
    <div class="grid2"><div>${svgBoilGraph()}</div>${motion('boil','Line stops rising at boiling point')}</div>
    <p>📝 <b>A2 Describe the pattern — fill the sentences:</b></p>
    <div class="mini">Between <b>0</b> and <b>2</b> minutes the temperature increased from <b>45 °C</b> to <b>98 °C</b>.<br>At <b>3</b> minutes the temperature stayed at <b>100 °C</b> and did not increase any more.</div>
    <p>📝 <b>A3</b> Boiling point of water = <b>100 °C</b> — read from the flat part of the graph.</p>
  </div>

add('topic-2 '+pickT(0),`<div class="card reveal"><div class="topbar"><span class="chip">4.1</span><h2>Cooling naphthalene</h2></div>
  <div class="body">
    <div class="grid2">
      <div>
        <p>A scientist melted solid ${V('naphthalene')}, then cooled it in ice, measuring temperature every minute for 18 minutes.</p>
        ${svgCoolGraph()}
        <p class="caption">Graph 4.2 — temperature of liquid naphthalene as it cools.</p>
      </div>
      <div>
        ${netImg('naphthaleneCrystal','A molecular model of a naphthalene crystal','max-width:240px;display:block;margin:0 auto 8px')}
        <div class="mini"><b>❓ What is naphthalene?</b><p>White flakes once used in mothballs. It melts at about <b>80 °C</b> and gives a clear flat part on a cooling graph.</p></div>
      </div>
    </div>
    <div class="grid3">
      <div class="mini"><b>a)</b> Describe the ${V('pattern')} — falls, then flat, then falls again.</div>
      <div class="mini"><b>b)</b> Between 4–11 min it stays flat = ${V('freezing')}/${V('melting point')} (changing state).</div>
      <div class="mini"><b>c)</b> Melting point ≈ <b>80 °C</b> (read off the flat part).</div>
    </div>
  </div>
  <div class="thai"><span class="tag">จุดสำคัญ</span>ตอนสารเปลี่ยนสถานะ อุณหภูมิจะ<b>คงที่</b> — ช่วงนี้ในกราฟเป็นเส้นนอน ใช้อ่านจุดหลอมเหลวได้</div></div>`,{section:'t41'});

add('topic-2 '+pickT(1),`<div class="card reveal"><div class="topbar"><span class="chip">4.1</span><h2>Chemical Properties</h2></div>
  <div class="body">
    <p>Materials also have <b>chemical properties</b> — seen when a substance takes part in a chemical change.</p>
    <div class="grid2">
      <div class="mini"><h3>${V('reactivity')}</h3><p>How likely a substance will undergo a chemical reaction.</p><p style="font-size:12px">💡 ${V('sodium')} + ${V('oxygen')} → reacts fast. ${V('iron')} → barely reacts. So sodium is more reactive.</p></div>
      <div class="mini"><h3>${V('flammability')}</h3><p>How easily a substance catches fire.</p>${motion('flame','Flammability test')}<span style="font-size:12px">${V('hydrogen')} = very ${V('flammable')}; ${V('nitrogen')} = ${V('non-flammable')}.</span></div>
    </div>
    <p>🧪 Knowing chemical properties helps scientists <b>identify</b> unknown materials by testing.</p>
  </div>
  <div class="thai"><span class="tag">เคมี</span>คุณสมบัติทางเคมีเกิดตอนทำปฏิกิริยา เช่น ความไวต่อปฏิกิริยา (โซเดียมไวกว่าเหล็ก) และความไวไฟ (ไฮโดรเจนติดไฟง่าย)</div></div>`,{section:'t41'});

add('topic-2 t-flip',factSlideHtml('Topic 4.1','🖐️','A metal that melts in your hand','Gallium melts at about 29.8°C. A warm hand can turn a solid piece of gallium into a shiny liquid, even though it is still the same substance.','Melting point is a physical property because no new substance is formed.','แกลเลียมมีจุดหลอมเหลวประมาณ 29.8°C ความร้อนจากมือจึงทำให้โลหะแข็งกลายเป็นของเหลวเงาวาวได้ โดยยังเป็นสารชนิดเดิม'),{section:'t41',label:'4.1 Did you know? · Gallium'});
add('topic-2 t-slide',realSlideHtml('Topic 4.1','galliumReal','Real gallium crystals','Solid gallium has a bright metallic surface. When warmed above its low melting point, the same sample becomes a silvery liquid.','Notice the metallic shine. The change from crystal to liquid is a change of state, not a chemical reaction.','ผลึกแกลเลียมจริงมีผิวเงาแบบโลหะ เมื่ออุ่นเกินจุดหลอมเหลวจะกลายเป็นของเหลวสีเงินโดยไม่เกิดสารใหม่'),{section:'t41',label:'4.1 Real example · Gallium'});

add('topic-2 '+pickT(2),`<div class="card reveal"><div class="topbar"><span class="chip">4.1</span><h2>Sodium — physical & chemical</h2></div>
  <div class="body">
    <div class="grid2">
      <div>
        <p>${V('sodium')} is a light grey metal. It is soft, has a ${V('low melting point')}, and reacts easily with ${V('oxygen')} and water.</p>
        <div class="mini" style="margin-top:8px"><b>Physical properties</b><ul><li>Light grey</li><li>Soft</li><li>Low melting point</li></ul></div>
        <div class="mini" style="margin-top:8px"><b>Chemical property</b><ul><li>Reactive with oxygen & water</li></ul></div>
      </div>
      <div>
        ${netImg('sodiumLump','Lump of sodium stored under oil to stop it reacting with air','max-width:230px;display:block;margin:0 auto 10px')}
        ${netImg('hydrogenTube','Hydrogen gas glowing in a discharge tube','max-width:230px;display:block;margin:0 auto')}
      </div>
    </div>
    <p>❓ How could a scientist test if a collected gas is ${V('hydrogen')}? → Test its ${V('flammability')} (the "pop" test)!</p>
  </div>
  <div class="thai"><span class="tag">โซเดียม</span>โซเดียมเป็นโลหะสีเทาอ่อน นุ่ม จุดหลอมเหลวต่ำ (กายภาพ) และไวต่อปฏิกิริยามาก (เคมี) — เก็บในน้ำมันกันปฏิกิริยากับอากาศ</div></div>`,{section:'t41'});

add('topic-2 '+pickT(3),`<div class="card reveal"><div class="topbar"><span class="chip">Science in context</span><h2>Alchemy · การเล่นแร่แปรธาตุ</h2></div>
  <div class="body">
    <div class="grid2">
      <div>
        <p>Despite many incorrect ideas, medieval ${V('alchemy')} made useful discoveries — they studied ${V('substance')}s and made new materials by trial and error, even though they couldn't explain how.</p>
        <p>The first true chemists started in the <b>17th century</b>, building on alchemists' work. Modern chemistry has important roots in the past.</p>

    </div>
  </div>
  <div class="thai"><span class="tag">ประวัติ</span>นักเล่นแร่แปรธาตุสมัยก่อน ทดลองทำสารใหม่ ๆ จนเกิดเป็นวิชาเคมีสมัยใหม่ในศตวรรษที่ 17 — ความรู้เดิมเป็นรากฐานสำคัญ</div></div>`,{section:'t41'});

add('topic-2 '+pickT(4),`<div class="card reveal"><div class="topbar"><span class="chip">4.1</span><h2>Key facts & skills</h2></div>
  <div class="body">
    <div class="mini" style="background:#eef1ff"><b>📌 Key facts</b><ul><li>All substances have chemical & physical properties.</li><li>Physical = observed/measured (mass, ${V('electrical conductivity')}, melting/boiling point).</li><li>Chemical = seen in a chemical change (${V('reactivity')}, ${V('flammability')}).</li></ul></div>
    <div class="mini" style="margin-top:8px;background:#eafaf2"><b>✅ Check your skills</b><ul><li>I can present observations & measurements in a suitable way.</li><li>I can describe trends/patterns, including ${V('anomalous results')}.</li><li>I can ${V('interpret')} results and explain what they show.</li></ul></div>
  </div>
  <div class="thai"><span class="tag">ทบทวน</span>สารมีคุณสมบัติ 2 ประเภท — กายภาพวัดได้, เคมีเห็นตอนเกิดปฏิกิริยา ใช้คุณสมบัติเหล่านี้จำแนกและอธิบายสารได้</div></div>`,{section:'t41',label:'4.1 Key facts'});

add('topic-3 '+pickT(0),`<div class="card reveal"><div class="topbar"><span class="chip">Topic 4.2</span><h2>Acidity and Indicators</h2></div>

add('topic-3 t-zoom',factSlideHtml('Topic 4.2','🥬','Red cabbage is a natural indicator','Red cabbage contains pigments that turn red or pink in acids, purple near neutral and blue-green in alkalis. You can make the indicator by soaking chopped leaves in warm water.','Some useful indicators come from plants rather than a laboratory bottle.','กะหล่ำปลีแดงมีสารสีที่เปลี่ยนเป็นแดงหรือชมพูในกรด เป็นม่วงเมื่อใกล้เป็นกลาง และเป็นฟ้าอมเขียวในด่าง จึงนำมาทำตัวบ่งชี้ธรรมชาติได้'),{section:'t42',label:'4.2 Did you know? · Red cabbage'});
add('topic-3 t-slide',realSlideHtml('Topic 4.2','cabbageReal','A real red cabbage','The purple leaves contain anthocyanin pigments. Crushing and soaking the leaves releases a coloured solution that responds to acids and alkalis.','The deep purple colour is the source of the indicator. The leaf itself does not need to look red.','กะหล่ำปลีแดงจริงมีใบสีม่วงเข้ม สารแอนโทไซยานินในใบจะละลายออกมาและเปลี่ยนสีตามความเป็นกรด–ด่าง'),{section:'t42',label:'4.2 Real example · Red cabbage'});

add('topic-3 '+pickT(1),`<div class="card reveal"><div class="topbar"><span class="chip">4.2</span><h2>The pH Scale & Universal Indicator</h2></div>

      <div class="mini"><b>pH 4–6</b><br>${V('weakly acidic')}</div><div class="mini"><b>pH 8–10</b><br>${V('weakly alkaline')}</div><div class="mini"><b>Closer to 0</b> = more acidic<br><b>Closer to 14</b> = more alkaline</div>

add('topic-3 t-flip',factSlideHtml('Topic 4.2','🫃','Your stomach contains a strong acid','Stomach acid can have a pH close to 1–2. It helps digest food and kill many microorganisms, while a protective mucus layer helps stop the acid damaging the stomach wall.','A strong acid can be useful when it is controlled and kept in the right place.','กรดในกระเพาะมีค่า pH ประมาณ 1–2 ช่วยย่อยอาหารและทำลายจุลินทรีย์หลายชนิด ส่วนชั้นเมือกจะช่วยป้องกันกรดไม่ให้ทำลายผนังกระเพาะ'),{section:'t42',label:'4.2 Did you know? · Stomach acid'});
add('topic-3 t-slide',realSlideHtml('Topic 4.2','stomachReal','Where stomach acid works','The stomach is a muscular organ that mixes food with acidic gastric juice. Its folded inner lining is protected by mucus.','The acid stays inside the stomach. Position and protective tissue allow a hazardous chemical to perform a useful job safely.','กระเพาะอาหารเป็นอวัยวะกล้ามเนื้อที่คลุกอาหารกับน้ำย่อยซึ่งเป็นกรด ผนังด้านในมีเมือกช่วยป้องกันเนื้อเยื่อ'),{section:'t42',label:'4.2 Real example · Stomach'});

add('topic-1 t-zoom',factSlideHtml('Topic 4.3','⚛️','Atoms are mostly empty space','If an atom were enlarged until its nucleus was the size of a pea, the outer electrons would be hundreds of metres away. Nearly all of the atom between them would be empty space.','Objects feel solid because of electrical forces between particles, not because atoms are packed without gaps.','อะตอมส่วนใหญ่เป็นพื้นที่ว่าง หากขยายนิวเคลียสให้มีขนาดเท่าเมล็ดถั่ว อิเล็กตรอนด้านนอกอาจอยู่ห่างออกไปหลายร้อยเมตร'),{section:'t43',label:'4.3 Did you know? · Empty space'});
add('topic-1 t-slide',realSlideHtml('Topic 4.3','atomReal','Atoms revealed by a scanning probe','A scanning tunnelling microscope can map individual atoms on a surface. The coloured bumps in the image represent measured positions, not ordinary camera pixels.','Scientists cannot photograph atoms with a classroom camera; they use interactions between a tiny probe and the surface to build an image.','ภาพระดับอะตอมสร้างจากกล้องจุลทรรศน์แบบหัววัด ซึ่งตรวจแรงหรือกระแสที่ผิวแล้วแปลงข้อมูลเป็นภาพ ไม่ใช่ภาพถ่ายจากกล้องธรรมดา'),{section:'t43',label:'4.3 Real example · Atomic surface'});

add('topic-1 '+pickT(0),`<div class="card reveal"><div class="topbar"><span class="chip">Topic 4.3</span><h2>The Particle Model</h2></div>

add('topic-1 '+pickT(1),`<div class="card reveal"><div class="topbar"><span class="chip">4.3</span><h2>Tiny particles · อนุภาคเล็กมาก</h2></div>
  <div class="body">
    <p>All solids, liquids and gases are made of tiny <b>${V('particle')}s</b> — too small to see. Some are single ${V('atom')}s; others are groups of atoms joined together.</p>

      <div class="mini" style="text-align:center"><svg viewBox="0 0 120 80" width="160" height="80"><circle cx="30" cy="40" r="12" fill="#5b8def"/><circle cx="90" cy="40" r="12" fill="#5b8def"/></svg><small>single atoms</small></div>

    </div>

  </div>
  <div class="thai"><span class="tag">อนุภาค</span>ทุกสารเกิดจากอนุภาคเล็กมากมองไม่เห็น บางสารเป็นอะตอมเดี่ยว บางสารเป็นกลุ่มอะตอม — วาดเป็นทรงกลมในแบบจำลองเพื่อให้เข้าใจง่าย</div></div>`,{section:'t43'});

add('topic-1 '+pickT(2),`<div class="card reveal"><div class="topbar"><span class="chip">4.3</span><h2>Solid — ของแข็ง</h2></div>
  <div class="body">

/* ===================== HELPERS ===================== */
function factSlideHtml(topic,emoji,title,text,takeaway,thai){
  return `<div class="card reveal fact-card"><div class="topbar"><span class="chip">${topic}</span><h2>Did you know?</h2></div>
    <div class="body fact-body">
      <div class="fact-visual"><div class="fact-ring"></div><span class="fact-emoji">${emoji}</span></div>
      <div class="fact-copy"><span class="fact-label">✨ Did you know? · รู้หรือไม่?</span><h3>${title}</h3><p>${text}</p><p class="fact-th">🇹🇭 ${thai}</p><div class="fact-takeaway">💡 ${takeaway}</div></div>
    </div></div>`;
}
function realSlideHtml(topic,imageKey,title,text,observe,thai){
  return `<div class="card reveal real-card"><div class="topbar"><span class="chip">${topic}</span><h2>See it in real life · ดูของจริง</h2></div>
    <div class="body real-body">
      <div class="real-photo">${netImg(imageKey,title)}<span class="real-badge">📷 REAL-WORLD EXAMPLE</span></div>
      <div class="real-copy"><h3>${title}</h3><p>${text}</p><div class="real-observe"><b>🔎 What to notice</b><p>${observe}</p></div><p class="real-th">🇹🇭 ${thai}</p></div>
    </div></div>`;
}
function flipSlideHtml(chip,title,q,a,thaiTag){
  return `<div class="card reveal"><div class="topbar"><span class="chip">${chip}</span><h2>${title}</h2></div>
  <div class="body">
    <div class="flip" onclick="this.classList.toggle('on')"><div class="inner">
      <div class="face front"><div class="q">${q}</div><div class="hint">คิดคำตอบในใจก่อน แล้วแตะเพื่อเปิดเฉลย</div></div>
      <div class="face back"><div class="a">${a}</div></div>
    </div></div>
  </div>
  <div class="thai"><span class="tag">ฝึก</span>${thaiTag}</div></div>`;
}
function mcqSlideHtml(topic,page,pages,items){
  const opts=items.map((it,k)=>{
    const idx=page+k;
    return `<div class="mcq quiz-shell" data-topic="${topic}" data-q="${idx}">
      <div class="quiz-orbit orbit-a"></div><div class="quiz-orbit orbit-b"></div>
      <div class="question-kicker"><span>Question</span><b>${idx+1}</b></div>
      <div class="stem">${it.q}</div>
      <div class="opts">${it.o.map((o,j)=>`<button onclick="answer(this,${j},${it.a},${idx},'${topic}')"><span class="option-letter">${String.fromCharCode(65+j)}</span><span class="option-text">${o}</span></button>`).join('')}</div>
      <div class="explain" id="ex-${topic}-${idx}">💡 ${it.e}</div>
    </div>`;
  }).join('');
  const pager=`<div class="pager">${Array.from({length:pages}).map((_,p)=>`<button class="${p===page?'cur':''}" onclick="render(MCQ_PAGE['${topic}'][${p}])">${p+1}</button>`).join('')}</div>`;
  return `<div class="card reveal"><div class="topbar"><span class="chip">MCQ · Topic ${topic}</span><h2>แบบทดสอบ 15 ข้อ (หน้า ${page+1}/${pages})</h2></div>
  <div class="body">
    <div class="scorebox" id="score-${topic}"><b>คะแนน ${topic}:</b> <span id="num-${topic}">0 / 15</span></div>
    ${opts}${pager}
  </div>
  <div class="thai"><span class="tag">เฉลยทันที</span>เลือกคำตอบแล้วเห็นถูก/ผิดพร้อมคำอธิบาย — ทำครบ 15 ข้อแล้วดูคะแนนรวมด้านบน (ใช้ปุ่มเลขหน้าด้านล่างเพื่อดูข้อถัดไป)</div></div>`;
}
function addMcqPages(cls,topic,items,section){
  const perPage=1;
  const pages=Math.ceil(items.length/perPage);
  const pageMap=[];
  for(let p=0;p<pages;p++){
    const slice=items.slice(p*perPage,p*perPage+perPage);
    const html=mcqSlideHtml(topic,p,pages,slice);
    add(cls+' '+pickT(p),html,{section,label:p===0?'MCQ '+topic:undefined,_mcqPage:true});
    pageMap.push(S.length-1);
  }
  MCQ_PAGE[topic]=pageMap;
}
const SCORES={'4.1':0,'4.2':0,'4.3':0};
const ANSWERED={};
function answer(btn,chosen,correct,qid,topic){
  const card=btn.closest('.mcq');
  if(card.dataset.done)return;
  card.dataset.done=1;
  const btns=card.querySelectorAll('.opts button');
  btns[correct].classList.add('correct');
  if(chosen===correct){playTone(true);if(!ANSWERED[topic+qid]){SCORES[topic]++;ANSWERED[topic+qid]=1;updateScore(topic);}}
  else{btn.classList.add('wrong');playTone(false);}
  document.getElementById('ex-'+topic+'-'+qid).classList.add('show');
  // confetti when THIS topic fully answered
  const topicQs=document.querySelectorAll('.mcq[data-topic="'+topic+'"]');
  if(topicQs.length>0 && [...topicQs].every(c=>c.dataset.done==='1')) confetti();
}
function updateScore(topic){
  document.querySelectorAll('[id="num-'+topic+'"]').forEach(el=>el.textContent=SCORES[topic]+' / 15');

function updateFinal(){
  const total=SCORES['4.1']+SCORES['4.2']+SCORES['4.3'];
  const box=document.getElementById('finalNum');
  if(box){box.textContent=total+' / 45';const msg=document.getElementById('finalMsg');const pct=Math.round(total/45*100);msg.textContent=pct>=80?'ยอดเยี่ยม! 🌟':pct>=60?'ดีมากครับ 👍':'พยายามอีกนิดนะ 💪';const pt=document.getElementById('perTopic');if(pt)pt.innerHTML=['4.1','4.2','4.3'].map(t=>`<div class="mini"><b>Topic ${t}</b><br>${SCORES[t]} / 15</div>`).join('');}
}
let actx;
function playTone(ok){try{actx=actx||new (window.AudioContext||window.webkitAudioContext)();const o=actx.createOscillator();const g=actx.createGain();o.connect(g);g.connect(actx.destination);o.frequency.value=ok?880:220;o.type='sine';g.gain.setValueAtTime(.2,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.3);o.start();o.stop(actx.currentTime+.3);}catch(e){}}
/* confetti */
const cc=document.getElementById('confetti');cc.width=innerWidth;cc.height=innerHeight;const cctx=cc.getContext('2d');let parts=[];
function confetti(){for(let i=0;i<120;i++)parts.push({x:innerWidth/2,y:innerHeight/3,vx:(Math.random()-.5)*8,vy:Math.random()*-8+2,g:.2,c:`hsl(${Math.random()*360},90%,60%)`,s:Math.random()*6+3,r:Math.random()*6});}
function drawConf(){cctx.clearRect(0,0,cc.width,cc.height);parts.forEach(p=>{p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;cctx.save();cctx.translate(p.x,p.y);cctx.rotate(p.r);cctx.fillStyle=p.c;cctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*1.6);cctx.restore();});parts=parts.filter(p=>p.y<cc.height+20);requestAnimationFrame(drawConf);}
drawConf();

const PH_QUESTIONS=[
  {q:'How should pH 3 be classified?',a:'Strongly acidic'},
  {q:'How should pH 8 be classified?',a:'Weakly alkaline'},
  {q:'Universal Indicator turns yellow at about pH 6. What is it?',a:'Weakly acidic'},
  {q:'How should pH 7 be classified?',a:'Neutral'},
  {q:'How should pH 14 be classified?',a:'Strongly alkaline'},
  {q:'Universal Indicator turns blue at about pH 10. What is it?',a:'Weakly alkaline'}
];
const PH_OPTIONS=['Strongly acidic','Weakly acidic','Neutral','Weakly alkaline','Strongly alkaline'];
function initPHQuiz(box){
  let index=0,score=0,answered=false;
  function draw(){
    answered=false;
    if(index>=PH_QUESTIONS.length){
      box.innerHTML='<div class="phq-prompt">Quiz complete! 🎉</div><p style="text-align:center">Score: <b>'+score+' / '+PH_QUESTIONS.length+'</b></p><button class="phq-next show">Try again</button>';
      box.querySelector('button').onclick=()=>{index=0;score=0;draw();};
      return;
    }
    const item=PH_QUESTIONS[index];
    box.innerHTML='<div class="phq-progress"><span>Question '+(index+1)+' / '+PH_QUESTIONS.length+'</span><span class="phq-bar"><i style="width:'+((index+1)/PH_QUESTIONS.length*100)+'%"></i></span></div><div class="phq-prompt">'+item.q+'</div><div class="phq-options"></div><div class="phq-feedback" aria-live="polite"></div><button class="phq-next">Next question →</button>';
    const options=box.querySelector('.phq-options'),feedback=box.querySelector('.phq-feedback'),next=box.querySelector('.phq-next');
    PH_OPTIONS.forEach(label=>{
      const button=document.createElement('button');button.textContent=label;
      button.onclick=()=>{
        if(answered)return;answered=true;
        [...options.children].forEach(b=>{b.disabled=true;if(b.textContent===item.a)b.classList.add('correct');});
        if(label===item.a){score++;feedback.textContent='Correct! ✅';feedback.style.color='var(--ok)';}
        else{button.classList.add('wrong');feedback.textContent='Not quite. The correct answer is '+item.a+'.';feedback.style.color='var(--no)';}
        next.classList.add('show');
      };
      options.appendChild(button);
    });
    next.onclick=()=>{index++;draw();};
  }
  draw();
}
const stage=document.getElementById('stage');let cur=0;

function activeTopic(section){
  return topicGroups.find(group=>group.keys.includes(section));

function classOf(i){return slides[i].className;}
function render(i){
  stage.classList.remove('forward','backward');
  stage.classList.add(i<cur?'backward':'forward');
  slides.forEach((s,k)=>{s.classList.remove('active','prev');if(k===i)s.classList.add('active');else if(k<i)s.classList.add('prev');});

function go(n){const next=Math.max(0,Math.min(slides.length-1,cur+n));if(next!==cur){slides[cur].classList.add('no-anim');setTimeout(()=>slides[cur].classList.remove('no-anim'),600);}render(next);}

function openMenu(){
  const m=document.getElementById('menuList');m.innerHTML='';
  const sections=[
    {key:'intro',head:'เปิดเรื่อง'},
    {key:'t41',head:'Topic 4.1 — Physical & Chemical'},

}

document.addEventListener('keydown',e=>{
