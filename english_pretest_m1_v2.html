<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pre-Test English M.1</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&family=Nunito:wght@400;600;700;800&display=swap');
:root {
  --pri: #6C5CE7; --pri-l: #a29bfe; --sec: #00b894; --sec-l: #55efc4;
  --acc: #fdcb6e; --dng: #e17055; --bg: #f0f2ff; --card: #fff;
  --txt: #2d3436; --txt2: #636e72;
  --sh: 0 8px 32px rgba(108,92,231,0.13); --r: 18px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Kanit','Nunito',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;min-height:100vh}

/* === BG === */
.bg-anim{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bc{position:absolute;border-radius:50%;opacity:.07;animation:fb 25s ease-in-out infinite}
.bc:nth-child(1){width:350px;height:350px;background:var(--pri);top:-80px;left:-60px}
.bc:nth-child(2){width:250px;height:250px;background:var(--sec);top:55%;right:-40px;animation-delay:-7s}
.bc:nth-child(3){width:280px;height:280px;background:var(--acc);bottom:-50px;left:35%;animation-delay:-14s}
@keyframes fb{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.12)}66%{transform:translate(-25px,25px) scale(.93)}}

/* === START === */
.start{position:fixed;inset:0;background:linear-gradient(135deg,#6C5CE7,#a29bfe 50%,#74b9ff);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .8s,transform .8s}
.start.hide{opacity:0;transform:scale(1.15);pointer-events:none}
.start h1{font-size:2.8em;color:#fff;text-align:center;margin-bottom:8px;animation:bi 1s ease;text-shadow:2px 4px 10px rgba(0,0,0,.2)}
.start p{font-size:1.2em;color:rgba(255,255,255,.9);margin-bottom:35px;animation:bi 1s ease .2s both}
.start-chars{display:flex;gap:60px;margin-bottom:35px;animation:bi 1s ease .4s both}
.start-btn{padding:16px 55px;font-size:1.3em;font-family:'Kanit';background:#fff;color:var(--pri);border:none;border-radius:50px;cursor:pointer;font-weight:700;box-shadow:0 8px 30px rgba(0,0,0,.2);transition:all .3s;animation:bi 1s ease .6s both}
.start-btn:hover{transform:translateY(-4px) scale(1.06);box-shadow:0 14px 45px rgba(0,0,0,.3)}
@keyframes bi{0%{opacity:0;transform:scale(.3) translateY(40px)}50%{transform:scale(1.05)}70%{transform:scale(.96)}100%{opacity:1;transform:scale(1)}}

/* === AVATAR SVG === */
.avatar{display:inline-block}
.avatar svg{filter:drop-shadow(0 4px 8px rgba(0,0,0,.1))}

/* === QUIZ === */
.quiz{position:relative;z-index:1;max-width:920px;margin:0 auto;padding:20px;display:none}
.quiz.on{display:block}

/* Progress */
.prog-wrap{background:#fff;border-radius:50px;padding:8px 18px;box-shadow:var(--sh);margin-bottom:22px;display:flex;align-items:center;gap:14px}
.prog-bar{flex:1;height:10px;background:#e8e8f0;border-radius:10px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--pri),var(--sec));border-radius:10px;transition:width .5s;width:0%}
.prog-txt{font-size:.82em;font-weight:600;color:var(--txt2);white-space:nowrap}

/* Part header */
.part-h{text-align:center;margin-bottom:18px;animation:sd .5s ease}
.part-badge{display:inline-block;background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;padding:7px 22px;border-radius:50px;font-size:.88em;font-weight:600;margin-bottom:6px}
.part-sub{font-size:1em;color:var(--txt2)}
@keyframes sd{0%{opacity:0;transform:translateY(-18px)}100%{opacity:1;transform:translateY(0)}}

/* Question card */
.q-card{background:#fff;border-radius:var(--r);padding:22px 28px;box-shadow:var(--sh);margin-bottom:18px;animation:si .5s ease;border-left:5px solid var(--pri)}
@keyframes si{0%{opacity:0;transform:translateX(25px)}100%{opacity:1;transform:translateX(0)}}
.q-num{display:inline-flex;align-items:center;justify-content:center;background:var(--pri);color:#fff;width:34px;height:34px;border-radius:50%;font-weight:700;font-size:.88em;margin-right:10px;flex-shrink:0}
.q-txt{font-size:1.1em;line-height:1.8}
.q-txt .bl{display:inline-block;min-width:90px;height:1.4em;border-bottom:3px dashed var(--pri);margin:0 4px;vertical-align:bottom}

/* Options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-top:14px}
.opt{display:flex;align-items:center;gap:11px;padding:13px 16px;background:#f8f9ff;border:2px solid #e8e8f0;border-radius:14px;cursor:pointer;transition:all .3s;font-family:'Kanit';font-size:.98em;text-align:left;color:var(--txt)}
.opt:hover{border-color:var(--pri);background:#f0eeff;transform:translateY(-2px);box-shadow:0 4px 15px rgba(108,92,231,.12)}
.opt.sel{border-color:var(--pri);background:linear-gradient(135deg,#6C5CE7,#a29bfe);color:#fff;transform:scale(1.02)}
.opt.ok{border-color:var(--sec);background:linear-gradient(135deg,#00b894,#55efc4);color:#fff;animation:pu .5s}
.opt.no{border-color:var(--dng);background:linear-gradient(135deg,#e17055,#fab1a0);color:#fff;animation:sk .5s}
.ol{width:28px;height:28px;border-radius:50%;background:#fff;color:var(--pri);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82em;flex-shrink:0}
.opt.sel .ol,.opt.ok .ol,.opt.no .ol{background:rgba(255,255,255,.3);color:#fff}
@keyframes pu{0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes sk{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}

/* Explain box */
.expl{margin-top:14px;padding:12px 16px;border-radius:12px;line-height:1.6;font-size:.95em}
.expl.ok-bg{background:#e8f5e9;border-left:4px solid var(--sec)}
.expl.no-bg{background:#fde8e8;border-left:4px solid var(--dng)}

/* Nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.nbtn{padding:11px 28px;font-size:1em;font-family:'Kanit';border:none;border-radius:50px;cursor:pointer;font-weight:600;transition:all .3s;display:flex;align-items:center;gap:8px}
.nbtn.pr{background:#fff;color:var(--pri);border:2px solid var(--pri)}
.nbtn.nx{background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;box-shadow:0 4px 15px rgba(108,92,231,.25)}
.nbtn:hover{transform:translateY(-2px)}
.nbtn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* === CHAT BUBBLE CONVERSATION === */
.chat-area{margin:15px 0}
.chat-row{display:flex;align-items:flex-end;gap:10px;margin-bottom:14px;animation:fu .5s ease both}
.chat-row.right{flex-direction:row-reverse}
.chat-row:nth-child(1){animation-delay:0s}
.chat-row:nth-child(2){animation-delay:.15s}
.chat-row:nth-child(3){animation-delay:.3s}
.chat-row:nth-child(4){animation-delay:.45s}
.chat-av{flex-shrink:0}
.chat-bub{max-width:420px;padding:12px 18px;border-radius:18px;font-size:1em;line-height:1.6;position:relative;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.chat-row:not(.right) .chat-bub{background:linear-gradient(135deg,#6C5CE7,#a29bfe);color:#fff;border-bottom-left-radius:4px}
.chat-row.right .chat-bub{background:#fff;color:var(--txt);border:2px solid #e8e8f0;border-bottom-right-radius:4px}
.chat-name{font-size:.72em;font-weight:600;margin-bottom:2px;opacity:.7}
.chat-row:not(.right) .chat-name{color:rgba(255,255,255,.8)}
@keyframes fu{0%{opacity:0;transform:translateY(12px)}100%{opacity:1;transform:translateY(0)}}

/* Conv blank in chat */
.cb{display:inline-block;min-width:50px;padding:2px 8px;border:2px dashed var(--acc);border-radius:6px;background:rgba(253,203,110,.25);font-weight:600;text-align:center}
.chat-row:not(.right) .cb{border-color:rgba(255,255,255,.5);background:rgba(255,255,255,.2);color:#fff}

/* Situation */
.situ{background:linear-gradient(135deg,#e8f5e9,#c8e6c9);border-radius:12px;padding:10px 16px;margin-bottom:14px;font-style:italic;color:#2e7d32;border-left:4px solid #4caf50;font-size:.95em}

/* === ILLUSTRATION === */
.illus{background:linear-gradient(135deg,#f8f9ff,#e8e8f0);border-radius:15px;padding:18px;margin:14px 0;display:flex;align-items:center;justify-content:center;min-height:110px;border:2px dashed var(--pri-l)}

/* Speed sign */
.ss{display:flex;flex-direction:column;align-items:center}
.ss-b{width:90px;height:90px;background:#fff;border:4px solid #333;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Nunito';font-weight:800}
.ss-b .s1{font-size:12px;letter-spacing:2px}.ss-b .s2{font-size:10px;letter-spacing:1px}.ss-b .s3{font-size:36px;line-height:1}
.ss-p{width:8px;height:28px;background:#666}

/* === READING PASSAGE === */
.rdpass{background:linear-gradient(135deg,#fff9e6,#fff3cc);border-radius:15px;padding:22px;margin:14px 0;border-left:5px solid var(--acc);line-height:1.85;font-size:1.02em;position:relative}
.rdpass .rl{position:absolute;top:-12px;left:18px;background:var(--acc);color:#fff;padding:2px 14px;border-radius:20px;font-size:.78em;font-weight:700}
.rdpass p{margin-bottom:8px}

/* Para label */
.pl{display:inline-flex;align-items:center;justify-content:center;background:var(--pri);color:#fff;width:26px;height:26px;border-radius:50%;font-weight:700;font-size:.82em;margin-right:7px}
.para-box{margin-bottom:10px;padding:11px 14px;background:#f8f9ff;border-radius:10px;border-left:4px solid var(--pri-l);line-height:1.7;font-size:.95em}

/* === STORY SCENE === */
.story-sc{position:relative;width:100%;height:280px;border-radius:15px;overflow:hidden;margin:14px 0;border:3px solid #5a9e3f}
.story-sky{position:absolute;inset:0;background:linear-gradient(180deg,#87CEEB 0%,#B0E0F0 60%,#90EE90 60%,#3a8f3a 100%)}
.story-river{position:absolute;bottom:25px;left:0;width:100%;height:55px;background:linear-gradient(180deg,#4FC3F7,#0277BD);overflow:hidden}
.story-river::before{content:'';position:absolute;top:0;left:0;width:200%;height:100%;background:repeating-linear-gradient(90deg,transparent 0px,rgba(255,255,255,.15) 40px,transparent 80px);animation:rwv 4s linear infinite}
@keyframes rwv{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.story-sun{position:absolute;top:12px;right:22px;width:50px;height:50px;animation:sp 4s ease-in-out infinite}
@keyframes sp{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.12);filter:brightness(1.15)}}
.s-tree{position:absolute;bottom:72px;left:42%;z-index:2}
.s-ant{position:absolute;bottom:82px;left:30px;z-index:6;transition:all 1.5s ease}
.s-ant.fallen{bottom:38px;left:80px;animation:drown 1s ease-in-out infinite}
.s-ant.saved{bottom:82px;left:180px}
.s-ant.biting{bottom:82px;left:calc(100% - 115px);transform:scaleX(-1)}
@keyframes drown{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-10px) rotate(12deg)}}
.s-dove{position:absolute;top:35px;left:44%;z-index:6;transition:all 1.5s ease}
.s-dove.fly{animation:fb2 2s ease-in-out infinite}
.s-dove.away{top:-60px;left:110%;transition:all 2s}
@keyframes fb2{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
.s-leaf{position:absolute;top:70px;left:46%;z-index:5;opacity:0;transition:all 1.5s ease}
.s-leaf.drop{opacity:1;top:40px;left:65px;animation:lf 1.2s ease-in-out infinite}
@keyframes lf{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(6deg)}}
.s-hunter{position:absolute;bottom:82px;right:-60px;z-index:6;opacity:0;transition:all 1.5s ease}
.s-hunter.show{right:50px;opacity:1}
.s-hunter.hurt{animation:sk .4s ease-in-out infinite}
.s-cap{position:absolute;bottom:0;left:0;width:100%;background:rgba(0,0,0,.72);color:#fff;padding:10px 14px;font-size:.88em;line-height:1.5;text-align:center;z-index:10}
.s-ctrls{display:flex;justify-content:center;gap:10px;margin:10px 0}
.s-btn{padding:8px 20px;border:none;border-radius:25px;font-family:'Kanit';font-size:.88em;cursor:pointer;color:#fff;transition:all .3s}
.s-btn.play{background:var(--pri)}.s-btn.rst{background:#636e72}
.s-btn:hover{transform:scale(1.06)}.s-btn:disabled{opacity:.4;cursor:not-allowed}

/* === RESULTS === */
.res{display:none;text-align:center;padding:40px 20px;position:relative;z-index:1}
.res.on{display:block}
.res-card{background:#fff;border-radius:28px;padding:38px;max-width:480px;margin:0 auto;box-shadow:var(--sh);animation:bi .8s ease}
.sc-circ{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(--pri) 0%,var(--pri-l) var(--sp),#e8e8f0 var(--sp));display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.sc-in{width:110px;height:110px;border-radius:50%;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sc-n{font-size:2.4em;font-weight:800;color:var(--pri);line-height:1}
.sc-t{font-size:.88em;color:var(--txt2)}
.res-msg{font-size:1.4em;font-weight:700;margin:14px 0}
.res-det{color:var(--txt2);margin-bottom:22px}
.rbtn{padding:13px 38px;font-size:1.05em;font-family:'Kanit';background:linear-gradient(135deg,var(--pri),var(--pri-l));color:#fff;border:none;border-radius:50px;cursor:pointer;font-weight:600;transition:all .3s}
.rbtn:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(108,92,231,.3)}

/* Confetti */
.conf-c{position:fixed;inset:0;pointer-events:none;z-index:9999}
.conf{position:absolute;width:10px;height:10px;top:-20px;animation:cf 3s ease-out forwards}
@keyframes cf{0%{transform:translateY(0) rotate(0);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Responsive */
@media(max-width:700px){.start h1{font-size:2em}.opts{grid-template-columns:1fr}.q-card{padding:16px 18px}.story-sc{height:220px}.chat-bub{max-width:260px}}
</style>
</head>
<body>
<div class="bg-anim"><div class="bc"></div><div class="bc"></div><div class="bc"></div></div>

<!-- === START === -->
<div class="start" id="startScreen">
  <h1>Pre-Test English</h1>
  <p>Entrance Exam M.1 | 50 Questions</p>
  <div class="start-chars">
    <!-- Teacher avatar -->
    <div class="avatar">
      <svg width="110" height="150" viewBox="0 0 110 150">
        <defs>
          <linearGradient id="tg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#6C5CE7"/><stop offset="100%" stop-color="#a29bfe"/></linearGradient>
          <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#00b894"/><stop offset="100%" stop-color="#55efc4"/></linearGradient>
        </defs>
        <!-- Body -->
        <rect x="28" y="68" width="54" height="60" rx="14" fill="url(#tg)"/>
        <!-- Arms -->
        <rect x="10" y="72" width="22" height="12" rx="6" fill="url(#tg)">
          <animateTransform attributeName="transform" type="rotate" values="-5,21,78;5,21,78;-5,21,78" dur="3s" repeatCount="indefinite"/>
        </rect>
        <rect x="78" y="72" width="22" height="12" rx="6" fill="url(#tg)">
          <animateTransform attributeName="transform" type="rotate" values="5,89,78;-5,89,78;5,89,78" dur="3s" repeatCount="indefinite" begin="1.5s"/>
        </rect>
        <!-- Head -->
        <circle cx="55" cy="36" r="28" fill="#FFDCC8">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite"/>
        </circle>
        <!-- Hair -->
        <path d="M28 30 Q30 8 55 6 Q80 8 82 30 L80 22 Q78 12 55 10 Q32 12 30 22Z" fill="#5a3825">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite"/>
        </path>
        <!-- Glasses -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite"/>
          <circle cx="44" cy="34" r="8" fill="none" stroke="#555" stroke-width="2"/>
          <circle cx="66" cy="34" r="8" fill="none" stroke="#555" stroke-width="2"/>
          <line x1="52" y1="34" x2="58" y2="34" stroke="#555" stroke-width="2"/>
        </g>
        <!-- Eyes -->
        <g>
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite"/>
          <circle cx="44" cy="34" r="3" fill="#333">
            <animate attributeName="ry" values="3;0.3;3" dur="4s" repeatCount="indefinite" keyTimes="0;0.025;0.05" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
          </circle>
          <circle cx="66" cy="34" r="3" fill="#333">
            <animate attributeName="ry" values="3;0.3;3" dur="4s" repeatCount="indefinite" keyTimes="0;0.025;0.05" calcMode="spline" keySplines="0.5 0 0.5 1;0.5 0 0.5 1"/>
          </circle>
        </g>
        <!-- Smile -->
        <path d="M47 44 Q55 52 63 44" fill="none" stroke="#e17055" stroke-width="2.5" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite"/>
        </path>
        <!-- Book -->
        <rect x="14" y="88" width="18" height="24" rx="2" fill="#e74c3c" transform="rotate(-10,23,100)"/>
        <rect x="16" y="90" width="14" height="20" rx="1" fill="#fff" transform="rotate(-10,23,100)" opacity=".3"/>
        <!-- Label -->
        <text x="55" y="146" text-anchor="middle" font-size="12" fill="#6C5CE7" font-weight="600" font-family="Kanit">Teacher</text>
      </svg>
    </div>
    <!-- Student avatar -->
    <div class="avatar">
      <svg width="110" height="150" viewBox="0 0 110 150">
        <rect x="28" y="68" width="54" height="60" rx="14" fill="url(#sg)"/>
        <rect x="10" y="72" width="22" height="12" rx="6" fill="url(#sg)">
          <animateTransform attributeName="transform" type="rotate" values="5,21,78;-5,21,78;5,21,78" dur="2.8s" repeatCount="indefinite"/>
        </rect>
        <rect x="78" y="72" width="22" height="12" rx="6" fill="url(#sg)">
          <animateTransform attributeName="transform" type="rotate" values="-5,89,78;5,89,78;-5,89,78" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
        </rect>
        <circle cx="55" cy="36" r="28" fill="#FFDCC8">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.8s" repeatCount="indefinite"/>
        </circle>
        <path d="M28 28 Q32 5 55 4 Q78 5 82 28 L80 20 Q76 8 55 7 Q34 8 30 20Z" fill="#2d1810">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.8s" repeatCount="indefinite"/>
        </path>
        <g>
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.8s" repeatCount="indefinite"/>
          <circle cx="44" cy="34" r="3.5" fill="#333"/>
          <circle cx="66" cy="34" r="3.5" fill="#333"/>
          <circle cx="45" cy="33" r="1.2" fill="#fff"/>
          <circle cx="67" cy="33" r="1.2" fill="#fff"/>
        </g>
        <path d="M47 44 Q55 51 63 44" fill="none" stroke="#e17055" stroke-width="2.5" stroke-linecap="round">
          <animateTransform attributeName="transform" type="translate" values="0,0;0,-4;0,0" dur="2.8s" repeatCount="indefinite"/>
        </path>
        <!-- Backpack strap -->
        <line x1="38" y1="68" x2="34" y2="82" stroke="#2d8f6f" stroke-width="3" stroke-linecap="round"/>
        <line x1="72" y1="68" x2="76" y2="82" stroke="#2d8f6f" stroke-width="3" stroke-linecap="round"/>
        <text x="55" y="146" text-anchor="middle" font-size="12" fill="#00b894" font-weight="600" font-family="Kanit">Student</text>
      </svg>
    </div>
  </div>
  <button class="start-btn" onclick="go()">Start!</button>
</div>

<!-- === QUIZ === -->
<div class="quiz" id="quiz">
  <div class="prog-wrap">
    <div class="prog-txt" id="pTxt">1 / 50</div>
    <div class="prog-bar"><div class="prog-fill" id="pFill"></div></div>
    <div class="prog-txt" id="sTxt">Score: 0</div>
  </div>
  <div id="pH" class="part-h"></div>
  <div id="qArea"></div>
  <div class="nav">
    <button class="nbtn pr" id="prevB" onclick="prev()">&#9664; Prev</button>
    <button class="nbtn nx" id="nextB" onclick="next()">Next &#9654;</button>
  </div>
</div>

<!-- === RESULTS === -->
<div class="res" id="resScreen">
  <div class="res-card">
    <div class="sc-circ" id="sCirc" style="--sp:0%"><div class="sc-in"><div class="sc-n" id="fScore">0</div><div class="sc-t">/ 50</div></div></div>
    <div class="res-msg" id="rMsg"></div>
    <div class="res-det" id="rDet"></div>
    <button class="rbtn" onclick="location.reload()">Try Again</button>
  </div>
</div>

<script>

function avatarSVG(type, size=60) {

    student: {body:'#00b894',body2:'#55efc4',hair:'#2d1810'},

}

const tvPassage = `My mother was telling me about how she and her family got their first television when she was a teenager. It was black and white TV. She said she only watched it at night. When I was young we had only about 3 or 4 different channels. My brother and I always fight each other to see favorite channels.\n\nNowadays we can get hundreds of channels on TV. There are channels with only old movies, and channels with only cooking, and channels with only fishing. It's amazing! There is a channel for everything. I think about how much my brothers and I would fight if we had hundreds of channels when I was a child. These days I see families with 2 or 3 or more televisions in their homes. I guess it stops people from fighting for watching different channel.`;

  {id:41,p:"V",pt:"Reading",tp:"read",pass:'"James is opening the car door, turning the key, driving down the road, and going to his home."',q:"What is James doing?",o:["James is walking home.","James is opening the door.","James is driving a car.","James is going to the road."],a:2,ex:"James is driving a car"},
  {id:42,p:"V",pt:"Reading",tp:"read-c",q:"What will happen after the events?",o:["James will open the car door.","James will arrive home.","James will get out of the office.","James will drive down the road."],a:1,ex:"James is going home → he will arrive home"},
  {id:43,p:"V",pt:"Reading",tp:"read",pass:'"I sold my old car to buy a new one."',q:'What does "one" mean?',o:["car","old","sold","order"],a:0,ex:"'one' replaces 'car'"},
  {id:44,p:"V",pt:"Reading",tp:"read-c",q:"What does this sentence mean?",o:["I want to buy an old car.","I want to buy a new car.","I can't sell my old car.","I can't sell my new car."],a:1,ex:"Sold old car to buy new one → wants a new car"},

  {id:46,p:"V",pt:"Reading — TV Passage",tp:"tv",q:"What is this story about?",o:["Television","Mother and I","Fight","Family"],a:0,ex:"The whole story is about Television"},
  {id:47,p:"V",pt:"Reading — TV Passage",tp:"tv-c",q:"When his mother was a teenager, TV was...",o:["black and white","full of colors","high technology","amazing"],a:0,ex:"'It was black and white TV'"},
  {id:48,p:"V",pt:"Reading — TV Passage",tp:"tv-c",q:"Why do you think the writer fights with his brother?",o:["Because they have three televisions.","Because they have too many channels to watch.","Because they don't want to watch the same channel.","Because they don't want the other to watch the favorite channel."],a:2,ex:"They fight because they don't want to watch the same channel"},
  {id:49,p:"V",pt:"Reading — TV Passage",tp:"tv-c",q:"According to the passage, which is TRUE?",o:["The writer and his brother never argue.","The writer could watch TV all day when young.","The writer liked channel 7 when young.","The writer and his brother like the same programs."],a:1,ex:"Option b is closest to the context"},
  {id:50,p:"V",pt:"Reading — TV Passage",tp:"tv-c",q:'What does "it" in paragraph 2, line 5 mean?',o:["shows","families","televisions","people"],a:2,ex:"'it' refers to televisions (having multiple TVs stops fighting)"}
];

// ========== STATE ==========
let cur=0, score=0, ans=new Array(50).fill(null), sstep=0, stmr=null;
let lastPass = {};

function go(){
  document.getElementById('startScreen').classList.add('hide');
  setTimeout(()=>{document.getElementById('startScreen').style.display='none';document.getElementById('quiz').classList.add('on');render()},800);
}

// ========== RENDER ==========
function render(){
  const q=Q[cur], area=document.getElementById('qArea');
  document.getElementById('pTxt').textContent=`${cur+1} / 50`;
  document.getElementById('pFill').style.width=`${((cur+1)/50)*100}%`;
  document.getElementById('sTxt').textContent=`Score: ${score}`;
  document.getElementById('pH').innerHTML=`<span class="part-badge">Part ${q.p}</span><div class="part-sub">${q.pt}</div>`;

  let h='';

  // === ILLUSTRATION ===
  if(q.tp==='pic-sick'){
    h+=`<div class="illus">
      <svg viewBox="0 0 120 120" width="110" height="110">
        <circle cx="60" cy="40" r="25" fill="#FFD5C2" stroke="#e8a87c" stroke-width="1"/>
        <path d="M38 35 Q40 15 60 15 Q80 15 82 35" fill="#5a3825"/>
        <path d="M48 38 Q52 42 56 38" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        <path d="M64 38 Q68 42 72 38" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
        <path d="M52 50 Q60 46 68 50" fill="none" stroke="#e17055" stroke-width="2" stroke-linecap="round"/>
        <rect x="72" y="42" width="5" height="25" rx="2" fill="white" stroke="#ccc" stroke-width="1" transform="rotate(-30,74,54)"/>
        <circle cx="75" cy="63" r="4" fill="#e74c3c" transform="rotate(-30,74,54)"/>
        <rect x="73.5" y="50" width="2" height="12" fill="#e74c3c" transform="rotate(-30,74,54)"/>
        <rect x="42" y="62" width="36" height="40" rx="8" fill="#74b9ff"/>
        <circle cx="38" cy="30" r="3" fill="#74b9ff" opacity=".7"><animate attributeName="cy" values="30;45" dur="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values=".7;0" dur="1.5s" repeatCount="indefinite"/></circle>
        <circle cx="82" cy="33" r="2.5" fill="#74b9ff" opacity=".6"><animate attributeName="cy" values="33;48" dur="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values=".6;0" dur="1.8s" repeatCount="indefinite"/></circle>
        <circle cx="46" cy="44" r="5" fill="#fab1a0" opacity=".6"/>
        <circle cx="74" cy="44" r="5" fill="#fab1a0" opacity=".6"/>
        <rect x="10" y="98" width="100" height="15" rx="5" fill="#dfe6e9"/>
        <rect x="5" y="95" width="18" height="22" rx="4" fill="#b2bec3"/>
      </svg>
    </div>`;
  } else if(q.tp==='speed'){
    h+=`<div class="illus"><div class="ss"><div class="ss-b"><div class="s1">SPEED</div><div class="s2">LIMIT</div><div class="s3">90</div></div><div class="ss-p"></div></div></div>`;
  } else if(qIllust[q.id]){
    h+=getIllust(qIllust[q.id]);
  }

  // === STORY SCENE (Q34) ===
  if(q.tp==='story'){
    h+=buildStory();
  }

  // === STORY PARAGRAPHS for Q34-37 ===
  if(q.tp==='story'||q.tp==='story-c'){
    h+='<div style="margin:14px 0">';
    storyParas.forEach(p=>{h+=`<div class="para-box"><span class="pl">${p.l}</span>${p.t}</div>`;});
    h+='</div>';
  }

  // === CONVERSATION (chat bubbles) ===
  if(q.tp==='conv'){
    if(q.sit) h+=`<div class="situ">${q.sit}</div>`;
    h+='<div class="chat-area">';
    const speakers = q.sp || ['teacher','student'];
    const s0name = q.cv[0].s;
    q.cv.forEach(line=>{
      const isRight = line.s !== s0name;
      const avType = isRight ? speakers[1] : speakers[0];
      h+=`<div class="chat-row${isRight?' right':''}">
        ${miniAvatar(avType)}
        <div class="chat-bub"><div class="chat-name">${line.s}</div>${line.t}</div>
      </div>`;
    });
    h+='</div>';
  }

  // === READING PASSAGE ===
  if(q.tp==='read'){
    lastPass.read = q.pass;
    h+=`<div class="rdpass"><span class="rl">Reading Passage</span><p style="margin-top:8px">${q.pass}</p></div>`;
  }
  if(q.tp==='read-c' && lastPass.read){
    h+=`<div class="rdpass"><span class="rl">Reading Passage</span><p style="margin-top:8px">${lastPass.read}</p></div>`;
  }

  // === TV PASSAGE ===
  if(q.tp==='tv'){
    h+=`<div class="rdpass"><span class="rl">Reading Passage</span><p style="margin-top:8px">${tvPassage.replace(/\n/g,'<br>')}</p></div>`;
  }
  if(q.tp==='tv-c'){
    h+=`<div class="rdpass"><span class="rl">Reading Passage</span><p style="margin-top:8px">${tvPassage.replace(/\n/g,'<br>')}</p></div>`;
  }

  // === QUESTION CARD ===
  h+=`<div class="q-card"><div style="display:flex;align-items:flex-start"><span class="q-num">${q.id}</span><span class="q-txt">${q.q||''}</span></div>`;

  // Options
  h+='<div class="opts">';
  const L=['a','b','c','d'];
  q.o.forEach((opt,i)=>{
    const sel=ans[cur]===i;
    let c='opt';
    if(sel) c+=ans[cur]===q.a?' ok':' no';
    const dis=ans[cur]!==null?'pointer-events:none;':'';
    h+=`<button class="${c}" style="${dis}" onclick="pick(${i})"><span class="ol">${L[i]}</span><span>${opt}</span></button>`;
  });
  h+='</div>';

  // Explanation
  if(ans[cur]!==null){
    const ok=ans[cur]===q.a;
    h+=`<div class="expl ${ok?'ok-bg':'no-bg'}"><strong>${ok?'Correct!':'Incorrect'}</strong>${!ok?`<br>Answer: <strong>${L[q.a]}. ${q.o[q.a]}</strong>`:''}
    <br><span style="color:var(--txt2);font-size:.9em">${q.ex}</span></div>`;
  }

  h+='</div>';
  area.innerHTML=h;

  document.getElementById('prevB').disabled=cur===0;
  document.getElementById('nextB').innerHTML=cur===49?'See Results':'Next &#9654;';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ========== STORY ==========
function buildStory(){
  return `<div class="story-sc" id="sSc">
    <div class="story-sky"></div>
    <div class="story-sun" id="sSun">${svgSun}</div>
    <div class="s-tree">${svgTree}</div>
    <div class="s-dove" id="sDove">${svgDove}</div>
    <div class="s-leaf" id="sLeaf">${svgLeaf}</div>
    <div class="s-ant" id="sAnt">${svgAnt}</div>
    <div class="s-hunter" id="sHunt">${svgHunter}</div>
    <div class="story-river"></div>
    <div class="s-cap" id="sCap">Press &#9654; to watch the story</div>
  </div>
  <div class="s-ctrls">
    <button class="s-btn play" id="sPlay" onclick="playS()">&#9654; Play Story</button>
    <button class="s-btn rst" onclick="rstS()">Reset</button>
  </div>`;
}

function playS(){
  const b=document.getElementById('sPlay');if(b)b.disabled=true;
  sstep=0;advS();
}
function advS(){
  const ant=document.getElementById('sAnt'),dove=document.getElementById('sDove'),leaf=document.getElementById('sLeaf'),hunt=document.getElementById('sHunt'),cap=document.getElementById('sCap');
  if(!ant)return;
  const steps=[
    ()=>{cap.textContent="One hot day, an ant was walking near a river bank...";ant.style.left='30px';ant.className='s-ant';},
    ()=>{cap.textContent="Suddenly, the ant fell into the river! The water was too strong!";ant.classList.add('fallen');},
    ()=>{cap.textContent="A dove on a nearby tree saw the ant. It plucked a leaf and dropped it into the water.";dove.classList.add('fly');leaf.classList.add('drop');},
    ()=>{cap.textContent="The ant climbed on the leaf and reached the shore safely!";ant.classList.remove('fallen');ant.classList.add('saved');},
    ()=>{cap.textContent="A few days later, a hunter came to the river bank. He wanted to shoot the dove!";hunt.classList.add('show');ant.classList.remove('saved');ant.style.left='180px';},
    ()=>{cap.textContent="The ant bit the hunter's leg to save the dove!";ant.classList.add('biting');},
    ()=>{cap.textContent="The hunter shouted in pain and missed the shot! The dove flew away safely!";hunt.classList.add('hurt');dove.classList.add('away');dove.classList.remove('fly');},
    ()=>{cap.textContent="The dove thanked the ant for saving its life. The End!";hunt.classList.remove('hurt');}
  ];
  if(sstep<steps.length){steps[sstep]();sstep++;stmr=setTimeout(advS,3500);}
  else{const b=document.getElementById('sPlay');if(b)b.disabled=false;}
}
function rstS(){
  clearTimeout(stmr);sstep=0;
  const a=document.getElementById('sAnt'),d=document.getElementById('sDove'),l=document.getElementById('sLeaf'),hu=document.getElementById('sHunt'),c=document.getElementById('sCap');
  if(a){a.className='s-ant';a.style.left='30px';}
  if(d)d.className='s-dove';if(l)l.className='s-leaf';if(hu)hu.className='s-hunter';
  if(c)c.textContent='Press \u25B6 to watch the story';
  const b=document.getElementById('sPlay');if(b)b.disabled=false;
}

// ========== INTERACTION ==========
function pick(i){if(ans[cur]!==null)return;ans[cur]=i;if(i===Q[cur].a)score++;render();}
function next(){if(cur===49){showRes();return;}if(cur<49){cur++;render();}}
function prev(){if(cur>0){cur--;render();}}

function showRes(){
  document.getElementById('quiz').classList.remove('on');
  const r=document.getElementById('resScreen');r.classList.add('on');
  const pct=Math.round((score/50)*100);
  document.getElementById('sCirc').style.setProperty('--sp',pct+'%');
  let m,d;
  if(pct>=80){m='Excellent!';d='You are ready for M.1!';confetti();}
  else if(pct>=60){m='Good job!';d='Almost there, keep going!';confetti();}
  else if(pct>=40){m='Keep trying!';d='Review the wrong answers and try again!';}
  else{m='Need more practice';d='Study the lessons and try again!';}
  document.getElementById('rMsg').textContent=m;
  document.getElementById('rDet').textContent=d;
  let ds=0;const si=setInterval(()=>{ds++;document.getElementById('fScore').textContent=ds;if(ds>=score)clearInterval(si);},50);
}

function confetti(){
  const c=document.getElementById('confC'),cols=['#6C5CE7','#00b894','#fdcb6e','#e17055','#74b9ff','#a29bfe','#ff7675','#55efc4'];
  for(let i=0;i<80;i++){const e=document.createElement('div');e.className='conf';e.style.left=Math.random()*100+'%';e.style.background=cols[~~(Math.random()*cols.length)];e.style.width=(Math.random()*8+5)+'px';e.style.height=(Math.random()*8+5)+'px';e.style.borderRadius=Math.random()>.5?'50%':'2px';e.style.animationDelay=Math.random()*2+'s';e.style.animationDuration=(Math.random()*2+2)+'s';c.appendChild(e);}
  setTimeout(()=>c.innerHTML='',5000);
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key==='Enter')next();
  if(e.key==='ArrowLeft')prev();
  if(e.key>='1'&&e.key<='4'){const i=parseInt(e.key)-1;if(i<Q[cur].o.length)pick(i);}
});
</script>
